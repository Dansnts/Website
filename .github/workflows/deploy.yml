name: Deploy to Infomaniak

on:
  workflow_run:
    workflows: ["Build Blog"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy www/ via FTP
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" \
               ftp://${{ secrets.FTP_HOST }} \
               -e "set ftp:ssl-allow no; mirror -R --delete --exclude '^\.' --verbose www/ ${{ secrets.FTP_REMOTE_PATH }}; quit"
